---
layout: default
---

<div class="columns">
    <div class="column is-two-thirds">
        <h2>Sample Posts</h2>
        <hr>
        {% for post in site.posts limit: 2 %}
            <h2><a href="{{post.url}}">{{ post.title }}</a></h2>
            <p>{{ post.content }}</p>
            <p>{{ post.date }}</p>
            <hr>
        {% endfor %}
    </div>
    <div class="column">
        <h2>Popular Posts</h2>
        <ul>
            {% for post in site.posts offset: 2 limit: 10 %}
            <li><a href="{{post.url}}">{{ post.title }}</a></li>
            {% endfor %}
        </ul>
    </div>
</div>
